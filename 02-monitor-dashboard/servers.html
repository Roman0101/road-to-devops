<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servers</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <aside class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-heart-pulse"></i>
            <span>INFRA MONITOR</span>
        </div>

        <nav>

            <a href="index.html" class="menu-item">
                <i class="fa-solid fa-gauge-high"></i>
                Dashboard
            </a>

            <a href="servers.html" class="menu-item">
                <i class="fa-solid fa-server"></i>

            </a>

            <a href="alerts.html" class="menu-item">
                <i class="fa-solid fa-triangle-exclamation"></i>
                Alerts
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-file"></i>
                Reports
            </a>

            <a href="#" class="menu-item">
                <i class="fa-solid fa-gear"></i>
                Settings
            </a>

        </nav>

    </aside>

    <div class="main">

        <header class="topbar">

        </header>

        <main class="principal-section">
            <div class="checks">
                <h2>Servers List</h2>
                <span>Status of all monitored servers</span>
                    <table id="serversTable">
                        <thead>

                                <th>Name</th>
                                <th id="status">Status</th>
                                <th>CPU</th>
                                <th>RAM</th>
                                <th>Disk</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Las filas se generan automáticamente -->
                        </tbody>
                    </table>
            </div>
        </main>

        <footer class="footerclass">
            <p>Infra Monitor Dashboard V1.0.0</p>
        </footer>

    </div>
